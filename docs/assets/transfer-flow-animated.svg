<svg xmlns="http://www.w3.org/2000/svg" width="980" height="180" viewBox="0 0 980 180" role="img" aria-label="Animated Spotify to YouTube Music transfer flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="nodeA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1DB954"/>
      <stop offset="100%" stop-color="#169c47"/>
    </linearGradient>
    <linearGradient id="nodeB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="nodeC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="980" height="180" rx="18" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="40" y="50" width="230" height="80" rx="14" fill="url(#nodeA)"/>
    <text x="155" y="84" text-anchor="middle" fill="#ffffff" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Spotify / Exportify</text>
    <text x="155" y="108" text-anchor="middle" fill="#dcfce7" font-size="13" font-family="Segoe UI, Arial, sans-serif">Source playlists + liked songs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="375" y="50" width="230" height="80" rx="14" fill="url(#nodeB)"/>
    <text x="490" y="84" text-anchor="middle" fill="#ffffff" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">spyt Matcher</text>
    <text x="490" y="108" text-anchor="middle" fill="#ede9fe" font-size="13" font-family="Segoe UI, Arial, sans-serif">Fast fuzzy match + refill</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="710" y="50" width="230" height="80" rx="14" fill="url(#nodeC)"/>
    <text x="825" y="84" text-anchor="middle" fill="#ffffff" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">YouTube Music</text>
    <text x="825" y="108" text-anchor="middle" fill="#fee2e2" font-size="13" font-family="Segoe UI, Arial, sans-serif">Playable migrated library</text>
  </g>

  <path d="M280 90 L365 90" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
  <path d="M615 90 L700 90" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
  <polygon points="365,90 353,84 353,96" fill="#93c5fd"/>
  <polygon points="700,90 688,84 688,96" fill="#93c5fd"/>

  <circle r="5" fill="#ffffff">
    <animateMotion dur="2.2s" repeatCount="indefinite" path="M280 90 L365 90"/>
  </circle>
  <circle r="5" fill="#ffffff">
    <animateMotion dur="2.2s" begin="0.5s" repeatCount="indefinite" path="M615 90 L700 90"/>
  </circle>

  <text x="490" y="152" text-anchor="middle" fill="#cbd5e1" font-size="13" font-family="Segoe UI, Arial, sans-serif">
    One-time setup ’ automated transfer ’ verify and refill missing tracks
  </text>
</svg>
